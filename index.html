<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cinema</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&family=DotGothic16&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface-hover: #1a1a1a;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --text-dim: #888;
    --accent: #f5c518;
    --accent-dim: #c49e10;
    --sprocket: #1e1e1e;
    --grain-opacity: 0.06;
    --imdb: #f5c518;
    --letterboxd: #00e054;
    --douban: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Silkscreen', 'Press Start 2P', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: var(--grain-opacity);
    pointer-events: none;
    z-index: 9999;
    animation: grainShift 0.4s steps(3) infinite;
  }

  @keyframes grainShift {
    0% { transform: translate(0, 0); }
    33% { transform: translate(-2px, 1px); }
    66% { transform: translate(1px, -1px); }
    100% { transform: translate(-1px, 2px); }
  }

  .sprocket-strip {
    position: fixed;
    top: 0;
    width: 38px;
    height: 100%;
    background: var(--sprocket);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    padding-top: 12px;
    overflow: hidden;
  }
  .sprocket-strip.left { left: 0; border-right: 2px solid #2a2a2a; }
  .sprocket-strip.right { right: 0; border-left: 2px solid #2a2a2a; }
  .sprocket-hole {
    width: 18px;
    height: 12px;
    border-radius: 3px;
    background: #0a0a0a;
    border: 1px solid #333;
    flex-shrink: 0;
  }

  .main-wrap {
    margin: 0 38px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 30px 40px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .site-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 22px;
    color: var(--text);
    letter-spacing: 3px;
    line-height: 1.6;
    text-shadow: 2px 2px 0 #000, 0 0 12px rgba(245,197,24,0.15);
  }
  .site-title .accent { color: var(--accent); }

  .lang-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
  }
  .lang-btn {
    background: transparent;
    color: var(--text-dim);
    border: none;
    padding: 6px 14px;
    font-family: 'Silkscreen', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .lang-btn.active {
    background: var(--accent);
    color: #000;
  }
  .lang-btn:hover:not(.active) {
    background: var(--surface-hover);
    color: var(--text);
  }

  nav {
    display: flex;
    gap: 0;
    padding: 20px 40px 0;
    border-bottom: 1px solid var(--border);
  }
  .nav-tab {
    background: transparent;
    color: var(--text-dim);
    border: none;
    padding: 12px 24px;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    cursor: pointer;
    letter-spacing: 1px;
    position: relative;
    transition: color 0.25s;
    white-space: nowrap;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--accent); }
  .nav-tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }

  .content {
    flex: 1;
    padding: 36px 40px 60px;
  }
  .tab-panel { display: none; animation: fadeUp 0.4s ease; }
  .tab-panel.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: var(--accent);
    margin-bottom: 24px;
    letter-spacing: 2px;
  }

  .about-text {
    font-family: 'Silkscreen', monospace;
    font-size: 14px;
    line-height: 2.2;
    color: var(--text);
    max-width: 700px;
  }
  .about-text p { margin-bottom: 16px; }
  .about-text .highlight { color: var(--accent); }

  .douban-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #000;
    color: #fff;
    border: 1px solid #444;
    padding: 10px 22px;
    font-family: 'Silkscreen', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.25s;
    margin-top: 8px;
  }
  .douban-btn:hover {
    border-color: #fff;
    background: #111;
    box-shadow: 0 0 12px rgba(255,255,255,0.08);
  }
  .douban-btn svg {
    width: 16px;
    height: 16px;
    fill: #fff;
    flex-shrink: 0;
  }

  .film-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'Silkscreen', monospace;
    font-size: 12px;
  }
  .film-table th {
    text-align: left;
    color: var(--accent);
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 10px 16px;
    border-bottom: 2px solid var(--border);
  }
  .film-table td {
    padding: 12px 16px;
    border-bottom: 1px solid #1a1a1a;
    color: var(--text);
    vertical-align: middle;
  }
  .film-row {
    cursor: pointer;
    transition: background 0.2s;
  }
  .film-row:hover td { background: var(--surface); }
  .film-row.has-review td:first-child {
    position: relative;
    padding-left: 28px;
  }
  .film-row.has-review td:first-child::before {
    content: '▸';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 11px;
    transition: transform 0.25s;
  }
  .film-row.expanded td:first-child::before {
    transform: translateY(-50%) rotate(90deg);
  }
  .film-table .rating {
    color: var(--accent);
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
  }
  .film-table .genre-tag {
    display: inline-block;
    background: #1a1a1a;
    color: var(--text-dim);
    padding: 2px 8px;
    border-radius: 2px;
    font-size: 10px;
    margin: 1px 2px;
  }

  .ext-links {
    display: inline-flex;
    gap: 8px;
    align-items: center;
  }
  .ext-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border-radius: 3px;
    text-decoration: none;
    transition: all 0.2s;
    opacity: 0.6;
  }
  .ext-link:hover {
    opacity: 1;
    transform: scale(1.15);
  }
  .ext-link.imdb {
    background: var(--imdb);
    color: #000;
    font-family: 'Press Start 2P', monospace;
    font-size: 5px;
    font-weight: bold;
    letter-spacing: -0.5px;
  }
  .ext-link.letterboxd {
    background: transparent;
    border: 1.5px solid var(--letterboxd);
  }
  .ext-link.letterboxd svg { width: 14px; height: 14px; }

  .review-row td {
    padding: 0 !important;
    border-bottom: 1px solid #1a1a1a;
  }
  .review-expand {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease, padding 0.3s ease;
    background: var(--surface);
    border-left: 3px solid var(--accent);
  }
  .review-expand.open { max-height: 400px; }
  .review-expand-inner { padding: 24px 30px; }
  .review-expand-inner p {
    font-family: 'Silkscreen', monospace;
    font-size: 13px;
    line-height: 2;
    color: #ccc;
  }
  .review-expand-inner .review-rating {
    margin-top: 14px;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: var(--accent);
  }

  .top-list {
    list-style: none;
    counter-reset: top;
    max-width: 700px;
  }
  .top-item {
    counter-increment: top;
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 16px 0;
    border-bottom: 1px solid #1a1a1a;
    transition: background 0.2s;
  }
  .top-item:hover {
    background: var(--surface);
    padding-left: 10px;
    padding-right: 10px;
  }
  .top-item::before {
    content: counter(top, decimal-leading-zero);
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    color: var(--accent);
    min-width: 48px;
  }
  .top-item:nth-child(-n+3)::before {
    text-shadow: 0 0 10px rgba(245,197,24,0.4);
  }
  .top-info { flex: 1; }
  .top-info h4 {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: var(--text);
    margin-bottom: 4px;
  }
  .top-info span {
    font-family: 'Silkscreen', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }
  .top-links {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  footer {
    padding: 20px 40px;
    text-align: center;
    font-size: 10px;
    color: var(--text-dim);
    border-top: 1px solid var(--border);
    font-family: 'Silkscreen', monospace;
    letter-spacing: 1px;
  }

  .main-wrap::after {
    content: '';
    position: fixed;
    top: 0; left: 38px; right: 38px; bottom: 0;
    background: repeating-linear-gradient(
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  @media (max-width: 768px) {
    .sprocket-strip { width: 20px; }
    .sprocket-hole { width: 10px; height: 7px; }
    .main-wrap { margin: 0 20px; }
    header { padding: 20px 16px 0; flex-direction: column; gap: 12px; }
    .site-title { font-size: 14px; }
    nav { padding: 14px 16px 0; flex-wrap: wrap; gap: 0; }
    .nav-tab { padding: 10px 12px; font-size: 8px; }
    .content { padding: 24px 16px 40px; }
    .section-title { font-size: 11px; }
    .film-table { font-size: 10px; }
    .film-table th, .film-table td { padding: 8px 8px; }
    .ext-link { width: 20px; height: 20px; }
    .ext-link.imdb { font-size: 4px; }
    .ext-link.letterboxd svg { width: 12px; height: 12px; }
  }
</style>
</head>
<body>

<div class="sprocket-strip left" id="sprocketsLeft"></div>
<div class="sprocket-strip right" id="sprocketsRight"></div>

<div class="main-wrap">
  <header>
    <div class="site-title">
      <span class="accent">▶</span> MY <span class="accent">CINEMA</span>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="switchLang('zh')">中文</button>
      <button class="lang-btn" onclick="switchLang('en')">EN</button>
    </div>
  </header>

  <nav id="mainNav">
    <button class="nav-tab active" data-tab="about"   data-zh="关于我" data-en="About Me">关于我</button>
    <button class="nav-tab"        data-tab="reviews" data-zh="影评" data-en="Reviews">影评</button>
    <button class="nav-tab"        data-tab="top10"   data-zh="十佳" data-en="Top 10">十佳</button>
  </nav>

  <div class="content">

    <div class="tab-panel active" id="panel-about">
      <h2 class="section-title" data-zh="关于我" data-en="About Me">关于我</h2>
      <div class="about-text">
        <p data-zh="你好，我是Troy。" data-en="Hi, I'm Troy.">你好，我是Troy。</p>
        <p data-zh="这个页面记录了我看过的电影，欢迎来到我的电影世界。"
           data-en="This page documents the films I've watched and welcome to come to my cinema world.">
          这个页面记录了我看过的电影，欢迎来到我的电影世界。
        </p>
        <p data-zh='📧 联系我：<span class="highlight">chuyuli96@gmail.com</span>'
           data-en='📧 Contact me: <span class="highlight">chuyuli96@gmail.com</span>'>
          📧 联系我：<span class="highlight">chuyuli96@gmail.com</span>
        </p>
        <p>
          <a href="https://www.douban.com/people/83482941/" target="_blank" rel="noopener" class="douban-btn">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M2 5h20v1.5H2V5zm1.5 3.5h17v8h-2.09l1.09 2.5h-2.18l-1.09-2.5H7.77l-1.09 2.5H4.5l1.09-2.5H3.5v-8zm2 1.5v5h13v-5h-13z"/></svg>
            <span data-zh="我的豆瓣" data-en="My Douban">我的豆瓣</span>
          </a>
        </p>
      </div>
    </div>

    <div class="tab-panel" id="panel-reviews">
      <h2 class="section-title" data-zh="影评" data-en="Reviews">影评</h2>
      <table class="film-table" id="filmTable">
        <thead>
          <tr>
            <th data-zh="片名" data-en="Title">片名</th>
            <th data-zh="导演" data-en="Director">导演</th>
            <th data-zh="年份" data-en="Year">年份</th>
            <th data-zh="类型" data-en="Genre">类型</th>
            <th data-zh="评分" data-en="Rating">评分</th>
            <th data-zh="链接" data-en="Links">链接</th>
          </tr>
        </thead>
        <tbody id="filmBody"></tbody>
      </table>
    </div>

    <div class="tab-panel" id="panel-top10">
      <h2 class="section-title" data-zh="我的十佳" data-en="My Top 10">我的十佳</h2>
      <ol class="top-list" id="topList"></ol>
    </div>

  </div>

  <footer>
    <span data-zh="©MY CINEMA · 我们电影院见" data-en="©MY CINEMA · See you in the movie theater">©MY CINEMA · 我们电影院见</span>
  </footer>
</div>

<script>
  // ══════════════════════════════════════════════════
  //  影评数据 — 只有这些会显示在「影评」选项卡中
  //  Reviews data — only these show in the Reviews tab
  // ══════════════════════════════════════════════════

  const films = [
    {
      zh: '两生花', en: 'The Double Life of Véronique',
      dirZh: '克日什托夫·基耶斯洛夫斯基', dirEn: 'Krzysztof Kieślowski',
      year: 1991,
      genreZh: ['剧情', '奇幻'], genreEn: ['Drama', 'Fantasy'],
      rating: '★★★★★',
      letterboxd: 'https://letterboxd.com/film/the-double-life-of-veronique/',
      imdb: 'https://www.imdb.com/title/tt0101765/',
      reviewZh: '基耶斯洛夫斯基用金色的光晕编织了一场关于灵魂共振的梦。两个维罗妮卡，一个在克拉科夫歌唱至死，一个在巴黎感受到了莫名的失落。影片不试图解释什么，它只是让你在离开影院之后，忽然觉得世界上某个角落也许有人正与你同频呼吸。',
      reviewEn: 'Kieślowski weaves a dream of soul resonance in golden light. Two Véroniques — one sings to death in Kraków, the other feels an inexplicable loss in Paris. The film never tries to explain; it simply leaves you wondering if somewhere in the world, someone is breathing in sync with you.'
    },
    {
      zh: '秘密与谎言', en: 'Secrets & Lies',
      dirZh: '迈克·李', dirEn: 'Mike Leigh',
      year: 1996,
      genreZh: ['剧情'], genreEn: ['Drama'],
      rating: '★★★★☆',
      letterboxd: 'https://letterboxd.com/film/secrets-lies/',
      imdb: 'https://www.imdb.com/title/tt0117589/',
      reviewZh: '迈克·李最擅长的就是把日常生活拍出令人窒息的张力。那场生日聚会上真相揭开的长镜头，所有人的表演都精准得可怕。布兰达·布莱斯的哭戏不是在演，是在把一个女人二十年的沉默一次性倾倒出来。',
      reviewEn: 'Mike Leigh excels at wringing suffocating tension from everyday life. The long take at the birthday party where truths unravel is terrifyingly precise in its performances. Brenda Blethyn\'s breakdown isn\'t acting — it\'s twenty years of silence pouring out of a woman all at once.'
    },
    {
      zh: '星河战队', en: 'Starship Troopers',
      dirZh: '保罗·范霍文', dirEn: 'Paul Verhoeven',
      year: 1997,
      genreZh: ['科幻', '动作'], genreEn: ['Sci-Fi', 'Action'],
      rating: '★★★★☆',
      letterboxd: 'https://letterboxd.com/film/starship-troopers/',
      imdb: 'https://www.imdb.com/title/tt0120201/',
      reviewZh: '1959年美国科幻大师海因莱因的代表作品——《星船伞兵》一经问世便因其“宣扬法西斯主义”遭到大量批评。而快40年后，在好莱坞颇有地位的范霍文却将决定其电影化。保罗范霍文幼时亲历二战，童年的经历使他对纳粹符号和强权崇拜充满兴趣，在他的诸多作品中都有过明显的体现。这自然会招来一些评论者的批评，被扣上“宣扬纳粹”的帽子，但也说明了范霍文会对这本小说的主题着迷的原因。 在不少观众和影评人对本片意识形态猛烈的抨击下，这部投资高达1亿美元的电影最终以票房惨败告终。那么本片到底是在宣扬还是在暗讽法西斯主义呢？这并不容易去评判。但如果深入到电影本身，它以一种全新且高明的方式讲述了纳粹的运作方式。整部电影的剧情推进方式是十分好莱坞式的，角色在设置上和转变上也和通常的商业大片十分类似，所以很容易变将它看作为一部庸俗的爆米花电影。但实际如果稍微仔细一看，便会发现这诸多看似不能更套路的剧情其实巧妙地服从于整个主题，并由此引申出一种与通常好莱坞大片截然不同的意味，从而达成某种似乎是反讽的效果。 纳粹的符号在全片可以说是无处不在。在最开始通过一台电视讲述了人类向虫族开战的原因：“虫族利用陨石袭击地球，所以人类亲自登上虫族的星球展开反击。”导演并没有告诉我们这个原因到底是真实的还是虚假的。但如果联想纳粹的行径，很容易对其中的真实性产生怀疑。电视起到的煽动性作用也在电影中被不断强调：夸张的招兵广告、被妖魔化的虫族、从娃抓起的仇恨教育都通过电视被一一呈现，贯彻全片，起到一种无处不在的洗脑效果，这在范霍文更早的《机械战警》中也有过类似的体现。而在展示军队生活时，范霍文采用了一种相当夸张的方式：男女混浴同住，性别差异被抹杀；神似纳粹军服的军装，每个士兵都要在打仗前文上神似纳粹标志的图案；还有军队中种种不合常理的规则和酷刑。大量的纳粹符号被明确地暴露出来，又可以无比清晰地察觉出每个符号的背后意义所在。 从全片来看，表面上瑞科看似是在一次一次的苦难中成长，完成蜕变，最终走向胜利，而实际上这是一个个体被逐渐洗脑而最终陷入集体狂欢的过程。有一点需要特别提出，最后瑞科发现了所谓的机动部队只不过是为其他部队卖命送死的棋子罢了，但在明知道真相的情况下，他仍选择继续作战。这样极端的意识形态显然已经进入他的内心深处，即便瑞科知道了它的虚假性，却仍会选择接受并甘愿成为其中的一份子。所以这样来看它实际讲述了瑞科从最初逐渐相信纳粹的意识形态，到之后逐渐发现了其中的虚伪性，但却又无法摆脱而在最后陷入狂欢的状态中的过程。 由此，这不仅仅是一部爆米花电影，它在满足商业性的同时，巧妙完成了作者私人的表达。',
      reviewEn: 'In 1959, the American science fiction master Robert A. Heinlein published his representative work Starship Troopers, which immediately drew widespread criticism for its alleged “promotion of fascism.” Nearly forty years later, however, the well-established Hollywood director Paul Verhoeven decided to adapt it into a film.

Having experienced World War II firsthand as a child, Verhoeven developed a lasting fascination with Nazi symbolism and the worship of authoritarian power—elements that appear prominently throughout many of his works. Naturally, this has led some critics to accuse him of “promoting Nazism,” but it also helps explain why he would be drawn to the themes of this novel.

Amid fierce ideological criticism from both audiences and critics, this $100 million production ultimately ended in a box office failure. So does the film promote fascism, or does it satirize it? This is not an easy question to answer. However, if we look closely at the film itself, it presents the mechanisms of Nazism in a strikingly original and sophisticated way.

The narrative progression of the film is highly Hollywood in style, and both the characterization and character development closely resemble those of conventional commercial blockbusters. As a result, it is easy to dismiss it as a shallow piece of popcorn entertainment. Yet a more careful viewing reveals that these seemingly formulaic plot elements are in fact cleverly subordinated to the film’s overarching theme. From this emerges a meaning that sharply diverges from typical Hollywood blockbusters, producing what appears to be a form of irony or satire.

Nazi symbolism is pervasive throughout the film. At the very beginning, a television broadcast explains the reason for humanity’s war against the alien “bugs”: “The bugs attacked Earth using asteroids, so humanity launched a counterattack by invading their planet.” The director never clarifies whether this justification is true or fabricated. However, when viewed in light of Nazi historical behavior, it is difficult not to question its credibility.

The propagandistic role of television is repeatedly emphasized: exaggerated recruitment advertisements, the demonization of the alien enemy, and indoctrination of hatred from an early age are all presented through TV broadcasts. These elements run throughout the film, creating an omnipresent brainwashing effect—a technique that had already appeared in Verhoeven’s earlier film RoboCop.

When depicting military life, Verhoeven adopts an intentionally exaggerated approach: men and women live and bathe together, erasing gender distinctions; uniforms strongly resemble those of the Nazis; soldiers mark themselves with symbols reminiscent of Nazi insignia before battle; and the military operates under a series of irrational rules and brutal punishments. These numerous Nazi symbols are openly displayed, and the meanings behind them can be clearly perceived.

From the perspective of the entire film, it may seem on the surface that the protagonist, Rico, grows through hardship and ultimately achieves victory. In reality, however, this is a process in which an individual is gradually indoctrinated and ultimately absorbed into a collective frenzy. One crucial detail deserves special attention: Rico eventually realizes that the so-called Mobile Infantry are merely expendable pawns, sacrificed for the benefit of other forces. Yet even after recognizing this truth, he still chooses to continue fighting.

This indicates that the ideology has already taken deep root within him. Even when Rico becomes aware of its falsehood, he continues to accept it and willingly becomes part of it. In this sense, the film portrays Rico’s journey from initially embracing fascist ideology, to gradually recognizing its hypocrisy, yet ultimately being unable to escape it and falling into a state of collective ecstasy.

Thus, this is far more than a simple popcorn movie. While fulfilling its commercial function, it also skillfully conveys the director’s personal expression.'

  let currentLang = 'zh';

  function linkHTML(film) {
    return `<span class="ext-links">
      <a href="${film.letterboxd}" target="_blank" rel="noopener" class="ext-link letterboxd" title="Letterboxd">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8" cy="12" r="4" fill="none" stroke="#00e054" stroke-width="2"/>
          <circle cx="16" cy="12" r="4" fill="none" stroke="#40bcf4" stroke-width="2"/>
        </svg>
      </a>
      <a href="${film.imdb}" target="_blank" rel="noopener" class="ext-link imdb" title="IMDb">IMDb</a>
    </span>`;
  }

  function renderFilmTable() {
    const tbody = document.getElementById('filmBody');
    tbody.innerHTML = '';
    films.forEach((film, i) => {
      const hasReview = film.reviewZh || film.reviewEn;
      const genres = currentLang === 'zh' ? film.genreZh : film.genreEn;
      const genreHTML = genres.map(g => `<span class="genre-tag">${g}</span>`).join('');
      const title = currentLang === 'zh' ? film.zh : film.en;
      const dir = currentLang === 'zh' ? film.dirZh : film.dirEn;

      const tr = document.createElement('tr');
      tr.className = 'film-row' + (hasReview ? ' has-review' : '');
      tr.dataset.index = i;
      tr.innerHTML = `
        <td>${title}</td>
        <td>${dir}</td>
        <td>${film.year}</td>
        <td>${genreHTML}</td>
        <td class="rating">${film.rating}</td>
        <td>${linkHTML(film)}</td>
      `;
      tbody.appendChild(tr);

      if (hasReview) {
        const reviewTr = document.createElement('tr');
        reviewTr.className = 'review-row';
        reviewTr.id = 'review-' + i;
        const review = currentLang === 'zh' ? film.reviewZh : film.reviewEn;
        reviewTr.innerHTML = `
          <td colspan="6">
            <div class="review-expand" id="expand-${i}">
              <div class="review-expand-inner">
                <p>${review}</p>
                <div class="review-rating">${film.rating}</div>
              </div>
            </div>
          </td>
        `;
        tbody.appendChild(reviewTr);

        tr.addEventListener('click', (e) => {
          if (e.target.closest('a')) return;
          document.getElementById('expand-' + i).classList.toggle('open');
          tr.classList.toggle('expanded');
        });
      }
    });
  }

  function renderTop10() {
    const ol = document.getElementById('topList');
    ol.innerHTML = '';
    top10Films.forEach((film) => {
      const li = document.createElement('li');
      li.className = 'top-item';
      const title = currentLang === 'zh' ? film.zh : film.en;
      const dirShort = currentLang === 'zh'
        ? film.dirZh.split('·').pop().trim()
        : film.dirEn.split(' ').pop();
      li.innerHTML = `
        <div class="top-info">
          <h4>${title}</h4>
          <span>${dirShort} · ${film.year}</span>
        </div>
        <div class="top-links">${linkHTML(film)}</div>
      `;
      ol.appendChild(li);
    });
  }

  // ── Sprocket Holes ──
  function fillSprockets() {
    const strips = document.querySelectorAll('.sprocket-strip');
    const count = Math.ceil(window.innerHeight / 30);
    strips.forEach(strip => {
      strip.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const hole = document.createElement('div');
        hole.className = 'sprocket-hole';
        strip.appendChild(hole);
      }
    });
  }
  fillSprockets();
  window.addEventListener('resize', fillSprockets);

  // ── Tab Navigation ──
  const tabs = document.querySelectorAll('.nav-tab');
  const panels = document.querySelectorAll('.tab-panel');
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      panels.forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    });
  });

  // ── Language Switch ──
  function switchLang(lang) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.textContent.trim() === (lang === 'zh' ? '中文' : 'EN'));
    });
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-' + lang + ']').forEach(el => {
      const val = el.getAttribute('data-' + lang);
      if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
        el.placeholder = val;
      } else {
        el.innerHTML = val;
      }
    });
    renderFilmTable();
    renderTop10();
  }

  // ── Initial Render ──
  renderFilmTable();
  renderTop10();
